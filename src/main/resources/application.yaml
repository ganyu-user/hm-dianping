server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC
    #  MySql 配置
    username:
    password:
  redis:
   #   Redis 配置
    host:
    port:
    password:
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包

logging:
  level:
    com.hmdp: debug

# Knife4j 配置
knife4j:
  # 开发环境开启，生产环境改为 false 关闭文档，防止接口泄露
  enable: true
  # 开启生产环境屏蔽（线上强制关闭，即使enable=true也不展示）
  production: false
  openapi:
    # 开启接口调试增强
    enable: true